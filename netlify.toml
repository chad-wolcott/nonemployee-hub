# netlify.toml — RSM Non-Employee Hub
# ─────────────────────────────────────────────────────────────────────────────
# Deployment: drag-and-drop the entire folder to Netlify.
# Folder structure:
#   index.html
#   app.jsx
#   netlify.toml
#   netlify/functions/
#       isc-proxy.js    ← server-side ISC proxy (required — fixes CORS)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "no-store"
